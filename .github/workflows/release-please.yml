name: release-please

on:
  push:
    branches: [release-v1]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          command: manifest
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: release-v1
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

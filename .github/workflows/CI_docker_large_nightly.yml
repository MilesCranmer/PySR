name: Docker_Large_Nightly

on:
  schedule:
    - cron: "0 10 15 * *"
  workflow_dispatch:
    inputs:
      include-arm64:
        description: "Also run a slow linux/arm64 QEMU smoke test"
        required: false
        default: false
        type: boolean

jobs:
  test:
    runs-on: ${{ matrix.os }}
    if: ${{ matrix.arch != 'linux/arm64' || (github.event_name == 'workflow_dispatch' && inputs.include-arm64) }}
    continue-on-error: ${{ matrix.arch == 'linux/arm64' }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.10', '1']
        python-version: ['3.10', '3']
        os: [ubuntu-latest]
        arch: ['linux/amd64', 'linux/arm64']


    steps:
      - uses: actions/checkout@v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all
      - name: Build docker
        run: docker build --platform=${{ matrix.arch }} -t pysr --build-arg JLVERSION=${{ matrix.julia-version }} --build-arg PYVERSION=${{ matrix.python-version }} .
      - name: Test docker
        run: docker run --platform=${{ matrix.arch }} --rm pysr /bin/bash -c 'pip install pytest nbval && python3 -m pysr test main,cli,startup'
